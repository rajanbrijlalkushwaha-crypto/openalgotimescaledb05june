services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: soctickdata-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: soctickdata
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d soctickdata"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tsdb_data:
    driver: local
