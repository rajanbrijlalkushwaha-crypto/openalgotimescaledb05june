# Nginx config for live.soc.ai.in
#
# Routes:
#   live.soc.ai.in/         → Option Chain  (Node.js port 3001)
#   live.soc.ai.in/broker/  → OpenAlgo      (port 5000)
#
# Install:
#   sudo cp ~/soctickdata/nginx/live.soc.ai.in.conf /etc/nginx/sites-available/live.soc.ai.in
#   sudo ln -sf /etc/nginx/sites-available/live.soc.ai.in /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name live.soc.ai.in;

    # ── OpenAlgo (/broker → redirect to OpenAlgo on port 5000) ─────────────────
    # Simple redirect — avoids sub-path proxy complexity with Flask/JS apps.
    location /broker {
        return 302 http://$host:5000;
    }

    # ── Socket.IO WebSocket ───────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Option Chain (everything else → Node.js) ──────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
