# Nginx config for live.soc.ai.in
#
# Routes:
#   live.soc.ai.in/         → Option Chain  (Node.js port 3001)
#   live.soc.ai.in/broker/  → OpenAlgo      (port 5000)
#
# Install:
#   sudo cp ~/soctickdata/nginx/live.soc.ai.in.conf /etc/nginx/sites-available/live.soc.ai.in
#   sudo ln -sf /etc/nginx/sites-available/live.soc.ai.in /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name live.soc.ai.in;

    # ── OpenAlgo (/broker → OpenAlgo on port 5000) ────────────────────────────
    # Strips the /broker prefix before forwarding to OpenAlgo.
    # sub_filter rewrites OpenAlgo's internal HTML links so navigation works.
    location /broker/ {
        proxy_pass         http://127.0.0.1:5000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     / /broker/;

        # Rewrite absolute links in OpenAlgo HTML so they stay under /broker/
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'href="/'    'href="/broker/';
        sub_filter 'action="/'  'action="/broker/';
        sub_filter 'src="/'     'src="/broker/';
        sub_filter "url('/'"    "url('/broker/";
    }

    # Redirect /broker (no trailing slash) → /broker/
    location = /broker {
        return 301 /broker/;
    }

    # ── Socket.IO WebSocket ───────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Option Chain (everything else → Node.js) ──────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
