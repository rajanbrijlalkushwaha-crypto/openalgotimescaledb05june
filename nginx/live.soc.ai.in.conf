# Nginx config for live.soc.ai.in
#
# Routes:
#   live.soc.ai.in/        → Option Chain  (Node.js port 3001)
#   live.soc.ai.in/broker  → OpenAlgo      (port 5000, native routes)
#
# After editing, apply with:
#   sudo python3 ~/soctickdata/nginx/apply.py && sudo systemctl reload nginx

server {
    listen 80;
    server_name live.soc.ai.in;

    # ── OpenAlgo entry point ──────────────────────────────────────────────────
    # /broker redirects to OpenAlgo login. All OpenAlgo's own routes (/auth/,
    # /dashboard, /api/v1/ etc.) are proxied to port 5000 directly so internal
    # navigation works without any URL prefix tricks.
    location = /broker {
        return 301 /auth/login;
    }

    # ── OpenAlgo native routes → port 5000 ───────────────────────────────────
    location ~* ^/(auth|dashboard|settings|logs|tradebook|orderbook|portfolio|position|history|webhook|analyzer|strategy|signals|admin|manage|profile|apikeys|scheduler|telegram|latency|traffic|health|indicators|copy|tv|chartink|mcp|oauth)(/|$) {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # OpenAlgo REST API
    location /api/v1/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # React static files (/static/js/, /static/css/, /static/media/)
    location ~* ^/static/(js|css|media)/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # OpenAlgo static files (everything else under /static/)
    location /static/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Socket.IO WebSocket ───────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Option Chain (everything else → Node.js) ──────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
